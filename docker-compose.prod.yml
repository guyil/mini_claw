version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mclaw_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mclaw_dev_pass}
      POSTGRES_DB: mclaw
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mclaw"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mclaw_redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mclaw_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mclaw:${POSTGRES_PASSWORD:-mclaw_dev_pass}@postgres:5432/mclaw
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
    container_name: mclaw_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3002}:3000"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
