version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mclaw_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mclaw_dev_pass}
      POSTGRES_DB: mclaw
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mclaw"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mclaw_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
